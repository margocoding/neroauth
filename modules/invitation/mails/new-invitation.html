<!DOCTYPE html>
<html>

<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#111111; color:#fff;">
  <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#111111" style="padding:40px 0;">
    <tr>
      <td align="center">
        <table width="500" cellpadding="0" cellspacing="0" bgcolor="#222222" border="0"
          style="border-collapse:collapse; border-radius: 15px;">

          <tr>
            <td align="center" style="padding:0; border-radius: 15px 15px 0 0; overflow:hidden;">
              <img src="{banner}" alt="Banner"
                style="width: 500px; height: auto; display: block; border-radius: 15px 15px 0 0;" />
            </td>
          </tr>

          <tr>
            <td style="padding:20px 20px 10px 20px; text-align:center; font-family:Arial, sans-serif; font-size:16px; color:#ffffff;">
              <p style="margin:0 0 10px 0;">{description}</p>
              <p style="margin:0 0 15px 0;">{subdescription}</p>

              <img src="{avatar_url}" alt="Avatar"
                style="border-radius: 50%; width: 80px; height: 80px; margin: 10px auto; display:block;" />
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:0 20px 20px 20px;">
              <a href="{web_app_url}/profile/friends" style="
                    display: inline-block;
                    padding: 16px 32px;
                    background-color: #ffa500;
                    color: #111111;
                    font-weight: bold;
                    font-size: 16px;
                    text-decoration: none;
                    border-radius: 8px;
                    font-family: Arial, sans-serif;
                  ">
                {button}
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
