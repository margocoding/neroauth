<!doctype html>
<html>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #111111;
      color: #fff;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      bgcolor="#111111"
      style="padding: 40px 0"
    >
      <tr>
        <td align="center">
          <table
            width="500"
            cellpadding="0"
            cellspacing="0"
            bgcolor="#222222"
            border="0"
            style="border-collapse: collapse; border-radius: 15px"
          >
            <tr>
              <td
                align="center"
                bgcolor="#ffa500"
                style="
                  padding: 30px;
                  color: #111111;
                  font-size: 28px;
                  font-weight: bold;
                  font-family: Arial, sans-serif;
                  border-radius: 15px;
                "
              >
                {title}
              </td>
            </tr>

            <tr>
              <td
                style="
                  padding: 20px;
                  text-align: center;
                  font-family: Arial, sans-serif;
                  font-size: 16px;
                  color: #ffffff;
                "
              >
                <p>{description}</p>
                <p>{subdescription}</p>

                <img
                  src="{avatar_url}"
                  alt="Аватар нового друга"
                  style="
                    border-radius: 50%;
                    width: 80px;
                    height: 80px;
                    margin: 20px auto;
                    display: block;
                  "
                />
              </td>
            </tr>

            <tr>
              <td align="center" style="padding: 15px">
                <a
                  href="{web_app_url}/profile/friends"
                  style="
                    display: inline-block;
                    padding: 12px 24px;
                    margin-top: 20px;
                    background-color: #ffa500;
                    color: #111111;
                    font-weight: bold;
                    text-decoration: none;
                    border-radius: 8px;
                    font-family: Arial, sans-serif;
                  "
                >
                  {button}
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
